<svg width="1600" height="840" viewBox="0 0 1600 840" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f87171;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="840" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#6366f1" stroke-width="0.5">
    <line x1="0" y1="100" x2="1600" y2="100" />
    <line x1="0" y1="200" x2="1600" y2="200" />
    <line x1="0" y1="300" x2="1600" y2="300" />
    <line x1="0" y1="400" x2="1600" y2="400" />
    <line x1="0" y1="500" x2="1600" y2="500" />
    <line x1="0" y1="600" x2="1600" y2="600" />
    <line x1="0" y1="700" x2="1600" y2="700" />
    <line x1="100" y1="0" x2="100" y2="840" />
    <line x1="200" y1="0" x2="200" y2="840" />
    <line x1="300" y1="0" x2="300" y2="840" />
    <line x1="400" y1="0" x2="400" y2="840" />
    <line x1="500" y1="0" x2="500" y2="840" />
    <line x1="600" y1="0" x2="600" y2="840" />
    <line x1="700" y1="0" x2="700" y2="840" />
    <line x1="800" y1="0" x2="800" y2="840" />
    <line x1="900" y1="0" x2="900" y2="840" />
    <line x1="1000" y1="0" x2="1000" y2="840" />
    <line x1="1100" y1="0" x2="1100" y2="840" />
    <line x1="1200" y1="0" x2="1200" y2="840" />
    <line x1="1300" y1="0" x2="1300" y2="840" />
    <line x1="1400" y1="0" x2="1400" y2="840" />
    <line x1="1500" y1="0" x2="1500" y2="840" />
  </g>

  <!-- LEFT SIDE: Title + Subtitle -->

  <!-- Title -->
  <text x="120" y="200" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="58" fill="#f1f5f9">From Domain Purchase</text>
  <text x="120" y="272" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="58" fill="#f1f5f9">to First Reply</text>

  <!-- Subtitle -->
  <text x="124" y="330" font-family="monospace" font-size="22" fill="#6366f1">Engineering Deliverability-First Outbound</text>

  <!-- Accent line under subtitle -->
  <rect x="120" y="348" width="180" height="3" rx="2" fill="url(#accent)" />

  <!-- RIGHT SIDE: Pipeline visualization -->

  <!-- Pipeline container -->
  <rect x="880" y="120" width="620" height="380" rx="16" fill="#12122a" stroke="#1e293b" stroke-width="1" />

  <!-- Pipeline label -->
  <text x="910" y="160" font-family="monospace" font-size="14" fill="#475569">// email pipeline</text>

  <!-- Node 1: Enrich -->
  <rect x="920" y="200" width="100" height="100" rx="14" fill="#1e1e36" stroke="#6366f1" stroke-width="2" />
  <text x="970" y="244" font-family="monospace" font-size="28" fill="#6366f1" text-anchor="middle">+</text>
  <text x="970" y="274" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Enrich</text>

  <!-- Arrow 1 -->
  <line x1="1024" y1="250" x2="1064" y2="250" stroke="#4b5563" stroke-width="2" />
  <polygon points="1060,244 1072,250 1060,256" fill="#4b5563" />

  <!-- Node 2: Validate -->
  <rect x="1076" y="200" width="100" height="100" rx="14" fill="#1e1e36" stroke="#22c55e" stroke-width="2" />
  <text x="1126" y="244" font-family="monospace" font-size="22" fill="#22c55e" text-anchor="middle">MX</text>
  <text x="1126" y="274" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Validate</text>

  <!-- Arrow 2 -->
  <line x1="1180" y1="250" x2="1220" y2="250" stroke="#4b5563" stroke-width="2" />
  <polygon points="1216,244 1228,250 1216,256" fill="#4b5563" />

  <!-- Node 3: Route -->
  <rect x="1232" y="200" width="100" height="100" rx="14" fill="#1e1e36" stroke="#f59e0b" stroke-width="2" />
  <text x="1282" y="244" font-family="monospace" font-size="22" fill="#f59e0b" text-anchor="middle">{~}</text>
  <text x="1282" y="274" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Route</text>

  <!-- Arrow 3 -->
  <line x1="1336" y1="250" x2="1376" y2="250" stroke="#4b5563" stroke-width="2" />
  <polygon points="1372,244 1384,250 1372,256" fill="#4b5563" />

  <!-- Node 4: Send -->
  <rect x="1388" y="200" width="100" height="100" rx="14" fill="#1e1e36" stroke="#8b5cf6" stroke-width="2" />
  <text x="1438" y="248" font-family="monospace" font-size="26" fill="#8b5cf6" text-anchor="middle">></text>
  <text x="1438" y="274" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Send</text>

  <!-- Feedback loop arrow -->
  <path d="M 1438 306 Q 1438 380 1190 380 Q 970 380 970 306" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.45" />
  <polygon points="966,312 970,300 974,312" fill="#ef4444" opacity="0.45" />
  <text x="1190" y="404" font-family="monospace" font-size="13" fill="#ef4444" text-anchor="middle" opacity="0.5">bounce feedback loop</text>

  <!-- Healing pipeline mini-label -->
  <text x="910" y="450" font-family="monospace" font-size="12" fill="#475569">healing: pause > quarantine > warmup > healthy</text>

  <!-- BOTTOM: Stats row -->
  <g transform="translate(0, 560)">
    <!-- Stat 1: Bounce rate -->
    <rect x="120" y="0" width="280" height="110" rx="14" fill="#12122a" stroke="#1e293b" stroke-width="1" />
    <text x="260" y="48" font-family="monospace" font-size="44" fill="url(#green)" text-anchor="middle" font-weight="700">1.2%</text>
    <text x="260" y="80" font-family="system-ui, sans-serif" font-size="18" fill="#64748b" text-anchor="middle">bounce rate (was 8%)</text>

    <!-- Stat 2: Domains burned -->
    <rect x="440" y="0" width="280" height="110" rx="14" fill="#12122a" stroke="#1e293b" stroke-width="1" />
    <text x="580" y="48" font-family="monospace" font-size="44" fill="url(#accent)" text-anchor="middle" font-weight="700">0</text>
    <text x="580" y="80" font-family="system-ui, sans-serif" font-size="18" fill="#64748b" text-anchor="middle">domains burned in 6mo</text>

    <!-- Stat 3: Inbox placement -->
    <rect x="760" y="0" width="280" height="110" rx="14" fill="#12122a" stroke="#1e293b" stroke-width="1" />
    <text x="900" y="48" font-family="monospace" font-size="44" fill="url(#amber)" text-anchor="middle" font-weight="700">91%</text>
    <text x="900" y="80" font-family="system-ui, sans-serif" font-size="18" fill="#64748b" text-anchor="middle">inbox placement</text>

    <!-- Stat 4: Reply rate -->
    <rect x="1080" y="0" width="280" height="110" rx="14" fill="#12122a" stroke="#1e293b" stroke-width="1" />
    <text x="1220" y="48" font-family="monospace" font-size="44" fill="#f1f5f9" text-anchor="middle" font-weight="700">3.8%</text>
    <text x="1220" y="80" font-family="system-ui, sans-serif" font-size="18" fill="#64748b" text-anchor="middle">reply rate (was 2.1%)</text>
  </g>

  <!-- Bottom branding -->
  <text x="800" y="780" font-family="monospace" font-size="18" fill="#475569" text-anchor="middle">superkabe.com</text>

  <!-- Glow effects -->
  <circle cx="1126" cy="250" r="70" fill="#22c55e" opacity="0.03" />
  <circle cx="1282" cy="250" r="70" fill="#f59e0b" opacity="0.03" />
  <circle cx="970" cy="250" r="70" fill="#6366f1" opacity="0.03" />
  <circle cx="1438" cy="250" r="70" fill="#8b5cf6" opacity="0.03" />
</svg>
